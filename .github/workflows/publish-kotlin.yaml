name: publish-kotlin

on:
  push:
    tags:
      - '**'

jobs:
  publish:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/publish-kotlin.yaml@4fed19bced81f4d1690fab4679e6453c774b0909 # main
    with:
      code-quality-check: false
      publish-maven-central: false
      publish-gradle-plugin-portal: false
      publish-jetbrains-marketplace: true
      publish-docs: false
      publish-github-release: false
    secrets: inherit
